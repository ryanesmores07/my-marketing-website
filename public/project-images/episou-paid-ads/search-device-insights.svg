  <text x="896" y="686" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">Landing pages and ad copy had to stay</text>
  <text x="896" y="718" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">mobile-first to match real buyer behavior.</text>
